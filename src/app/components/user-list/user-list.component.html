<div class="user-list-container">
  <h2>User Management</h2>
  <p>Total users: {{ userCount() }} | Admins: {{ adminCount() }}</p>

  <div class="filters">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      placeholder="Search by name or email..."
      class="search-input"
    />

    <select [(ngModel)]="selectedRole" class="role-filter">
      <option value="all">All Roles</option>
      <option value="admin">Admin</option>
      <option value="editor">Editor</option>
      <option value="viewer">Viewer</option>
    </select>

    <label>
      <input type="checkbox" [(ngModel)]="showActiveOnly" />
      Active only
    </label>
  </div>

  <table class="user-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (user of displayedUsers; track user.id) {
        <tr [class.inactive]="!user.isActive">
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.role }}</td>
          <td>{{ user.isActive ? 'Active' : 'Inactive' }}</td>
          <td>
            <button (click)="onToggleStatus(user.id)">
              {{ user.isActive ? 'Deactivate' : 'Activate' }}
            </button>
            <button (click)="onRemoveUser(user.id)">Remove</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
